name: Dog API Tests

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  api-tests:
    name: API Tests - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm test

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dog-api-html-report-${{ matrix.os }}-${{ github.run_number }}
          path: reports/html
          if-no-files-found: warn

      - name: Upload raw test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dog-api-cucumber-json-${{ matrix.os }}-${{ github.run_number }}
          path: reports/cucumber-json
          if-no-files-found: warn